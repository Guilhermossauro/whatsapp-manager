<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp Manager</title>
  <link rel="stylesheet" href="/css/styles.css" />

</head>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

        </div>
        <span class="logo-text">WA Manager</span>
      </div>

      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span>Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-page="contacts">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Contatos</span>
        </a>
        <a href="#" class="nav-item" data-page="lists">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span>Listas</span>
        </a>
        <a href="#" class="nav-item" data-page="campaigns">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
          <span>Campanhas</span>
        </a>
        <a href="#" class="nav-item" data-page="flows">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M13 6h3a2 2 0 0 1 2 2v7"/><line x1="6" y1="9" x2="6" y2="21"/></svg>
          <span>Fluxos</span>
        </a>

          <span>WhatsApp</span>
          <span class="nav-badge" id="wa-status-badge">●</span>
        </a>
        <a href="#" class="nav-item" data-page="api">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <span>API</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="worker-status" id="worker-status">
          <div class="pulse-dot"></div>
          <span>Worker ativo</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <button class="sidebar-toggle" id="sidebarToggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="top-bar-title" id="page-title">Dashboard</div>
        <div class="top-bar-actions">
          <div class="wa-indicator" id="wa-indicator">
            <div class="wa-dot disconnected" id="wa-dot"></div>
            <span id="wa-status-text">Desconectado</span>
          </div>
        </div>
      </header>

      <div class="page-content" id="page-content">
        <div class="loading-spinner"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <div id="modal-container"></div>

  <script src="/js/components/toast.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/pages/dashboard.js"></script>
  <script src="/js/pages/contacts.js"></script>
  <script src="/js/pages/campaigns.js"></script>
  <script src="/js/pages/flows.js"></script>
  <script src="/js/pages/whatsapp.js"></script>
  <script src="/js/pages/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
